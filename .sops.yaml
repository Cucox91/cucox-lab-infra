keys:
  - &cucox_lab age1z7fje8ex3nyl05f4e6e4y80klf783ala6gwyjnnt35hevcah2g2qvdutld

creation_rules:
  # Anything explicitly named *.secrets.yml / *.secrets.yaml
  - path_regex: \.secrets\.ya?ml$
    age: *cucox_lab

  # Anything inside a secrets/ directory
  - path_regex: (^|/)secrets/.+\.ya?ml$
    age: *cucox_lab

  # Conventional k8s Secret manifests (foo-secret.yaml, foo-secrets.yaml)
  - path_regex: -secrets?\.ya?ml$
    age: *cucox_lab

  # Cloudflared tunnel credentials
  - path_regex: (^|/)cloudflared/creds\..+
    age: *cucox_lab

  # Generic credentials.json blobs
  - path_regex: (^|/)credentials\.json$
    age: *cucox_lab

  # Terraform secret-vars: anything under terraform/<provider>/ whose
  # filename starts with `secrets` (e.g. secrets.auto.tfvars.enc.yaml).
  # See runbook 01 § 1.2 — Proxmox API token lives here.
  - path_regex: ^terraform/.+/secrets[^/]*\.ya?ml$
    age: *cucox_lab

  # Encrypted-at-rest YAML files using the *.enc.yaml convention
  # (e.g. ansible/group_vars/k3s/secrets.enc.yaml — k3s join token, runbook 02 §1).
  # Also enables sops to match when encrypting from /dev/stdin via
  # `--filename-override`-style invocations down the road.
  - path_regex: \.enc\.ya?ml$
    age: *cucox_lab

  # Encrypted-at-rest JSON files using the *.enc.json convention
  # (e.g. ansible/group_vars/lab_edge/tunnel-creds.enc.json — Cloudflare
  # Tunnel credentials, runbook 03 §2.4). Same `--filename-override`
  # rationale as the YAML rule above.
  - path_regex: \.enc\.json$
    age: *cucox_lab
