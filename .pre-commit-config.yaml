---
# See ADR-0008 for rationale.
# Run `pre-commit autoupdate` periodically to bump hook revs.

repos:
  # Block plaintext credential patterns (AWS keys, GH tokens, high-entropy strings, ...)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Refuse unencrypted commits to paths covered by .sops.yaml
  - repo: https://github.com/yuvipanda/pre-commit-hook-ensure-sops
    rev: v1.1
    hooks:
      - id: sops-encryption
        files: >-
          (?x)^(
            .*\.secrets\.ya?ml
            | .*/secrets/.+\.ya?ml
            | .*-secrets?\.ya?ml
            | .*cloudflared/creds\..+
            | .*credentials\.json
          )$

  # Terraform formatting + linting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint

  # Ansible linting
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        # Only run when Ansible files are present; ansible-lint auto-detects.
        # Restrict to common Ansible paths to avoid spurious runs.
        files: ^(roles/|playbooks/|inventory/|ansible/).*\.(ya?ml)$

  # YAML linting (covers everything else)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]
