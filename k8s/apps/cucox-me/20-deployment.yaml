# cucox-me — resume site Deployment.
#
# Image is the multi-stage Docker build from the app repo
# (Apps Code/Resume App Updated/my-resume-app-code/Dockerfile),
# published to ghcr.io/cucox91/my-resume-app as a public package.
# No imagePullSecrets needed since the package is public.
#
# securityContext is set for PSA `restricted` compliance:
#   - runAsNonRoot, runAsUser/Group set explicitly
#   - readOnlyRootFilesystem: Express + static-file-serving don't
#     write anywhere; if a future feature needs scratch space, mount
#     an emptyDir at /tmp rather than relaxing this
#   - allowPrivilegeEscalation: false
#   - capabilities drop ALL
#   - seccompProfile RuntimeDefault
#
# automountServiceAccountToken: false — the resume app does not talk
# to the Kubernetes API, so the default SA token is just attack
# surface.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cucox-me-web
  namespace: cucox-me
  labels:
    app.kubernetes.io/name: cucox-me-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cucox-me-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cucox-me-web
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/cucox91/my-resume-app:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cucox-me-config
            - secretRef:
                name: cucox-me-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
