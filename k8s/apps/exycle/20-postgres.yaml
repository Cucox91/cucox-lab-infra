# exycle — in-cluster Postgres for the API.
#
# Single-replica StatefulSet on local-path storage. Sufficient for
# Phase 2; the lab is single-site and the workload is tiny. When/if
# we need HA + PITR + automatic failover, swap to CloudNativePG —
# the storage shape (a single PVC named exycle-postgres-data-0) is
# straightforward to import into a CNPG `Cluster` resource.
#
# The Service is *headless* (clusterIP: None) so each pod gets a
# stable DNS name (exycle-postgres-0.exycle-postgres.exycle.svc).
# The connection string in the Secret uses `exycle-postgres` (the
# Service short name), which round-robins across pods — fine for a
# single replica, future-proof if we ever scale.
#
# securityContext: PSA `restricted` requires runAsNonRoot. The
# postgres:16-alpine image's default user is `postgres` (UID 70).
# We pin runAsUser: 70 explicitly so the container, the PVC's
# fsGroup ownership, and PSA admission all agree.
#
# Resource requests are conservative for the lab. Tune up once
# you see real usage in Grafana.

apiVersion: v1
kind: Service
metadata:
  name: exycle-postgres
  namespace: exycle
  labels:
    app.kubernetes.io/name: exycle-postgres
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: exycle-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: exycle-postgres
  namespace: exycle
  labels:
    app.kubernetes.io/name: exycle-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: exycle-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exycle-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exycle-postgres
        app.kubernetes.io/component: database
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: exycle
            - name: POSTGRES_USER
              value: exycle
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exycle-secrets
                  key: POSTGRES_PASSWORD
            # Tells the postgres init script where to put the cluster
            # data. We mount the PVC at /var/lib/postgresql/data, but
            # the alpine image creates a sibling dir to allow the
            # init scripts to skip if /pgdata already initialized.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # postgres writes WAL, sockets, etc.
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "exycle", "-d", "exycle"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "exycle", "-d", "exycle"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
