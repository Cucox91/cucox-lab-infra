---
# Cucox Lab — Ansible inventory
#
# Reconstructed 2026-05-21 during the Mac workstation rebuild (runbook 00d).
# The original inventory was never committed to git and was not in the
# mac-reset backup bundle, so it was rebuilt from authoritative sources:
#   - Host names / IPs / VLANs : ARCHITECTURE.md § 4.4 (VM inventory)
#   - SSH user (ubuntu)        : runbooks 02 (k3s) and 03 (cloudflared)
#
# This file is NOT gitignored — commit it so it survives the next rebuild.
#
# Groups map to the Ansible roles under ansible/roles/:
#   k3s_server  -> roles/k3s_server      k3s_agent -> roles/k3s_agent
#   lab_edge    -> roles/cloudflared     (all)     -> roles/common
#
# NOTE on group_vars/cucox_me and group_vars/monitoring: those are NOT
# Ansible groups with member hosts. They are SOPS-encrypted secret stores
# consumed directly (e.g. `sops -d ansible/group_vars/monitoring/grafana.enc.yaml
# | yq ... | helm ...` in runbook 04, and the cucox_me secret in runbook 05).
# They intentionally have no entry here. If you later add real Ansible
# automation for them, add the groups at that point.

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:

    # k3s HA cluster — VLAN 20 (cluster). 3 control-plane + 2 workers.
    k3s:
      children:
        k3s_server:
          hosts:
            lab-cp01:
              ansible_host: 10.10.20.21
            lab-cp02:
              ansible_host: 10.10.20.22
            lab-cp03:
              ansible_host: 10.10.20.23
        k3s_agent:
          hosts:
            lab-wk01:
              ansible_host: 10.10.20.31
            lab-wk02:
              ansible_host: 10.10.20.32

    # Cloudflared tunnel edge VM — VLAN 30 (dmz).
    lab_edge:
      hosts:
        lab-edge01:
          ansible_host: 10.10.30.21
